# Codebase-Insights example configuration
# Chat (summarisation) and embedding providers are independent —
# you can mix providers, e.g. OpenAI for chat + Ollama for embeddings.

[chat]
provider = "ollama"              # "ollama" or "openai-compatible"

[chat.ollama]
base_url = "http://localhost:11434"
model    = "qwen2.5"

[chat.openai-compatible]
# API key is read from the CODEBASE_INSIGHTS_CHAT_API_KEY or OPENAI_API_KEY environment variable.
# Do not store API keys in this file.
base_url = ""                    # Leave blank for official OpenAI; set for compatible APIs (DeepSeek, Azure, etc.)
model    = "gpt-4o-mini"

[embed]
provider = "ollama"              # "ollama" or "openai-compatible"

[embed.ollama]
base_url = "http://localhost:11434"
model    = "nomic-embed-text"

[embed.openai-compatible]
# API key is read from the CODEBASE_INSIGHTS_EMBED_API_KEY or OPENAI_API_KEY environment variable.
# Do not store API keys in this file.
base_url = ""
model    = "text-embedding-3-small"

[semantic]
index_kinds = [
    "Class",
    "Method",
    "Function",
    "Interface",
    "Enum",
    "Constructor",
]
concurrency = 16   # parallel LLM requests per batch (increase for OpenAI, keep low for Ollama)
batch_size  = 16  # symbols processed per round
min_ref_count = 5  # skip symbols referenced fewer than this many times
                   # set to 0 to index all symbols, including new files with no cross-references yet
summary_update_threshold = 5  # number of files that must change before file/project summaries
                               # are auto-regenerated during live editing (watchdog updates).
                               # Set to 1 to regenerate on every change, 0 to disable auto-regen.
                               # Use the refresh_file_summary / refresh_project_summary MCP tools
                               # to force an immediate update at any time.

summary_file_idle_timeout = 30    # seconds a file must be idle (no further symbol changes) before
                                  # its stale summary is auto-regenerated, regardless of the threshold.
                                  # Set to 0 to disable per-file idle regeneration.

summary_project_idle_timeout = 300  # seconds the whole project must be idle (no watchdog events)
                                    # before all stale file summaries and the project summary are
                                    # regenerated in one batch.  Set to 0 to disable.
